name: Generate Trophies
on:
  schedule:
    # Run weekly on Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-trophies:
    name: Generate GitHub Trophy SVG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=Diwas2055&theme=darkhub&column=4&row=2&margin-w=4&no-bg=true&no-frame=true'
          path: .github/assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push trophy SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/trophy.svg
          git diff --staged --quiet || (git commit -m "chore: update trophy SVG [skip ci]" && git push)
