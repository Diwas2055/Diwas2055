name: Generate Profile Assets
on:
  schedule:
    # Run daily at midnight to keep streak stats current
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-assets:
    name: Generate Trophy & Streak SVGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=Diwas2055&theme=darkhub&column=4&row=2&margin-w=4&no-bg=true&no-frame=true'
          path: .github/assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak SVG
        uses: zients/github-readme-streak-stats@v2
        with:
          options: 'user=Diwas2055&theme=dark&hide_border=true&background=0d1117&ring=1f6feb&fire=1f6feb&currStreakLabel=58a6ff&disable_animations=true'
          path: .github/assets/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/trophy.svg .github/assets/streak.svg
          git diff --staged --quiet || (git commit -m "chore: update profile assets [skip ci]" && git push)
